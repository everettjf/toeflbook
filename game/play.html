  <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
  <div class="wrap"><div id="app"></div></div>

  <script src="content.js?v=4"></script>
  <!-- lib/three.min.js (603KB) is lazy-loaded by core.js only for WebGL engines -->

  <script src="engines/synonym-snake.js?v=4"></script>

  <script src="engines/grammar-invaders.js?v=4"></script>
  <script src="engines/sentence-surgeon.js?v=4"></script>

  <script>
    (function () {
      var p = new URLSearchParams(location.search);

      if (!d || d < 1) d = 1;
      TDG.start(d);
    })();
  </script>
